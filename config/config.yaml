# Kraken Telegram Trading Bot Configuration

# Exchange Settings
exchange:
  name: kraken
  sandbox: true  # Set to false for live trading
  rate_limit: 1200  # milliseconds between requests
  enable_rate_limit: true

# Trading Settings
trading:
  default_pair: XBT/USD
  timeframe: 1h
  max_positions: 5
  position_size_percent: 2.0  # % of portfolio per trade
  stop_loss_percent: 3.0
  take_profit_percent: 6.0
  daily_loss_limit_percent: 10.0
  leverage: 1

# Risk Management
risk:
  max_drawdown_percent: 20.0
  volatility_adjustment: true
  correlation_limit: 0.7
  max_sector_exposure: 30.0

# Machine Learning Settings
ml:
  model_type: ppo  # Options: ppo, dqn, random_forest, lstm
  retrain_frequency_hours: 24
  lookback_period: 100
  feature_count: 10
  training_split: 0.8
  validation_split: 0.1
  test_split: 0.1
  hyperparameters:
    learning_rate: 0.0003
    batch_size: 64
    n_steps: 2048
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2

# Telegram Bot Settings
telegram:
  bot_token: YOUR_TELEGRAM_BOT_TOKEN_HERE
  admin_user_ids: []  # List of Telegram user IDs for admin commands
  notification_enabled: true
  signal_notifications: true
  trade_notifications: true
  error_notifications: true

# Data Settings
data:
  update_frequency_seconds: 30
  cache_enabled: true
  cache_ttl_hours: 1
  storage_path: ./data/historical

# Backtesting Settings
backtest:
  initial_balance: 10000.0
  commission_percent: 0.26
  slippage_percent: 0.1
  max_trades_per_day: 100

# Logging
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file_path: ./logs/bot.log
  max_size_mb: 10
  backup_count: 5